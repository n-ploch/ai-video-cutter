services:

  # ── Message broker + result backend ────────────────────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── REST API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./local/data/projects:/app/data/projects
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - STORAGE_ROOT=/app/data/projects
      - CONFIG_PATH=/app/config/default.yaml
      # Absolute path to the projects folder on the *host* machine.
      # Used by the OTIO exporter so target_url resolves correctly in NLEs.
      # Override in .env or here: HOST_STORAGE_ROOT=/absolute/path/to/local/data/projects
      - HOST_STORAGE_ROOT=${HOST_STORAGE_ROOT:-}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Video pipeline worker (CPU-bound) ──────────────────────────────────────
  # Runs DownsampleStep, OpticalFlowStep, SegmentScenesStep, PersistStep.
  # Default concurrency=2 (one worker process per video in flight).
  # Override: CELERY_VIDEO_CONCURRENCY=4
  celery-video:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    volumes:
      - ./local/data/projects:/app/data/projects
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - STORAGE_ROOT=/app/data/projects
      - CONFIG_PATH=/app/config/default.yaml
      - CELERY_VIDEO_CONCURRENCY=${CELERY_VIDEO_CONCURRENCY:-2}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A worker.celery_app worker
        --queues video
        --concurrency ${CELERY_VIDEO_CONCURRENCY:-2}
        --loglevel info
        --hostname video@%h
    restart: unless-stopped

  # ── VLM description worker (I/O-bound) ─────────────────────────────────────
  # Uploads clips to Gemini File API and polls for results.
  # Uses gevent pool so each greenlet blocks on I/O independently.
  # Rate limiting is enforced at the task level (rate_limit="30/m" on vlm.segment).
  # Default concurrency=10. Override: CELERY_VLM_CONCURRENCY=20
  celery-vlm:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    volumes:
      - ./local/data/projects:/app/data/projects
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - STORAGE_ROOT=/app/data/projects
      - CONFIG_PATH=/app/config/default.yaml
      - CELERY_VLM_CONCURRENCY=${CELERY_VLM_CONCURRENCY:-10}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A worker.celery_app worker
        --queues vlm
        --pool gevent
        --concurrency ${CELERY_VLM_CONCURRENCY:-10}
        --loglevel info
        --hostname vlm@%h
    restart: unless-stopped

  # ── LangGraph agent worker (LLM API-bound) ─────────────────────────────────
  # Runs storyboard and editor LangGraph workflows.
  # Different projects have no shared state; LLM calls are I/O-bound.
  # Default concurrency=2. Override: CELERY_AGENTS_CONCURRENCY=4
  celery-agents:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    volumes:
      - ./local/data/projects:/app/data/projects
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - STORAGE_ROOT=/app/data/projects
      - CONFIG_PATH=/app/config/default.yaml
      - CELERY_AGENTS_CONCURRENCY=${CELERY_AGENTS_CONCURRENCY:-2}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A worker.celery_app worker
        --queues agents
        --concurrency ${CELERY_AGENTS_CONCURRENCY:-2}
        --loglevel info
        --hostname agents@%h
    restart: unless-stopped

  # ── Frontend (React SPA served via nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Optional: Flower task monitor ──────────────────────────────────────────
  # Uncomment to enable the Celery monitoring dashboard at http://localhost:5555
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app flower --port=5555

volumes:
  redis_data:
