video:
  hwaccel: null
  downsample:
    target_fps: null
    target_width: 640
    output_format: mp4
  optical_flow:
    target_fps: 4.0
    pyr_scale: 0.5
    levels: 3
    winsize: 15
    iterations: 3
    poly_n: 5
    poly_sigma: 1.2
  segmentation:
    fd_penalty: 3.0
    subseg_penalty: 2.0
    savgol_window: 11
    savgol_poly: 2

vlm:
  provider: gemini
  model: gemini-pro-latest
  temperature: 0.3
  gemini_api_key: null
  request_delay_s: 2.0

storyboard:
  max_revisions: 2
  review_threshold: 0.7
  context_threshold: 0.5
  human_in_the_loop: false
  story_writer:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.7
    base_url: null
    api_key: null
    extra_headers: {}
  story_judge:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.1
    base_url: null
    api_key: null
    extra_headers: {}
  narrator:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.3
    base_url: null
    api_key: null
    extra_headers: {}
  director:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.5
    base_url: null
    api_key: null
    extra_headers: {}
  judge:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.1
    base_url: null
    api_key: null
    extra_headers: {}

editor:
  model: claude-opus-4-6
  similarity_threshold: 0.8
