video:
  hwaccel: null
  downsample:
    target_fps: null
    target_width: 640
    output_format: mp4
  optical_flow:
    target_fps: 4.0
    pyr_scale: 0.5
    levels: 3
    winsize: 15
    iterations: 3
    poly_n: 5
    poly_sigma: 1.2
  segmentation:
    fd_penalty: 3.0
    subseg_penalty: 2.0
    savgol_window: 11
    savgol_poly: 2

vlm:
  provider: gemini
  model: gemini-pro-latest
  temperature: 0.3
  gemini_api_key: null
  request_delay_s: 2.0

storyboard:
  max_revisions: 2
  review_threshold: 0.7
  context_threshold: 0.5
  human_in_the_loop: false
  story_writer:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.7
    base_url: null
    api_key: null
    extra_headers: {}
  story_judge:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.1
    base_url: null
    api_key: null
    extra_headers: {}
  narrator:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.3
    base_url: null
    api_key: null
    extra_headers: {}
  director:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.5
    base_url: null
    api_key: null
    extra_headers: {}
  judge:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.1
    base_url: null
    api_key: null
    extra_headers: {}

editor:
  skip_stitching: false   # bypass stitch_scenes
  skip_review: false      # bypass review_timeline
  human_in_the_loop: false
  max_gate2_rounds: 1
  embedding_model: "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"
  top_k_candidates: 15
  min_candidates_per_scene: 3
  candidate_alpha: 0.7
  top_k_chains: 5
  duration_tolerance: 0.2
  stitching_cost_threshold: 0.6
  w1: 0.4
  w2: 0.3
  w3: 0.2
  w4: 0.1
  w5: 0.3
  narrative_analyst:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.3
    base_url: null
    api_key: null
    extra_headers: {}
  editorial_selector:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.2
    base_url: null
    api_key: null
    extra_headers: {}
  stitching_agent:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.2
    base_url: null
    api_key: null
    extra_headers: {}
  reviewer:
    provider: mistral
    model: mistral-large-latest
    temperature: 0.1
    base_url: null
    api_key: null
    extra_headers: {}
